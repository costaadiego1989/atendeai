server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Gzip compression — Core Web Vitals / ranking factor
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 256;
  gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml
    application/rss+xml
    application/atom+xml
    image/svg+xml
    font/woff
    font/woff2;

  # Security headers (trust signals + Core Web Vitals)
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  # SPA routing — HTML must not be cached (hashed assets handle versioning)
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
  }

  # Admin — noindex so Google never crawls internal pages
  location /admin {
    try_files $uri $uri/ /index.html;
    add_header X-Robots-Tag "noindex, nofollow" always;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # Hashed static assets — immutable long-term cache
  location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|webp|woff|woff2)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    try_files $uri =404;
  }

  # sitemap and robots — always fresh
  location ~* \.(xml|txt)$ {
    add_header Cache-Control "no-cache, must-revalidate";
    try_files $uri =404;
  }
}
